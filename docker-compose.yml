services:
  swade-pdf-exporter:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Puerto interno (Coolify espera 3000 por defecto)
      - PORT=3000
      # Orígenes CORS permitidos (separados por coma).
      # Pon aquí la URL de tu servidor Foundry VTT.
      # Ejemplo: https://foundry.tudominio.com
      # Usa * para permitir todos (menos seguro).
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
