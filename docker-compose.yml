services:
  swade-pdf-exporter:
    build: .
    ports:
      - "5050:80"
    environment:
      # Puerto interno del contenedor (80 para que Coolify/Traefik lo detecte por defecto)
      - PORT=80
      # Orígenes CORS permitidos (separados por coma).
      # Pon aquí la URL de tu servidor Foundry VTT.
      # Ejemplo: https://foundry.tudominio.com
      # Usa * para permitir todos (menos seguro).
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:80/health')\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
