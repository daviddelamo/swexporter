services:
  swade-pdf-exporter:
    build: .
    ports:
      - "5050:5050"
    environment:
      # Orígenes CORS permitidos (separados por coma).
      # Pon aquí la URL de tu servidor Foundry VTT.
      # Ejemplo: https://foundry.tudominio.com
      # Usa * para permitir todos (menos seguro).
      - CORS_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
